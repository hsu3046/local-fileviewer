<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery VR</title>
  <meta name="description" content="로컬 네트워크 파일 갤러리">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Login Screen -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          <rect x="9" y="9" width="6" height="6" rx="1" opacity="0.5" />
        </svg>
      </div>
      <h1 class="login-title">Gallery VR</h1>
      <p class="login-subtitle">접속하려면 패스워드를 입력하세요</p>
      <form id="login-form" autocomplete="off">
        <div class="login-input-wrap">
          <input type="password" id="login-password" class="login-input" placeholder="패스워드" autofocus
            autocomplete="current-password" />
          <button type="submit" class="login-btn" id="login-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          </button>
        </div>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Header -->
  <header class="header" id="header" style="display:none">
    <div class="header-left">
      <button class="icon-btn" id="btn-back" title="뒤로가기" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5" />
          <path d="m12 19-7-7 7-7" />
        </svg>
      </button>
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>
    <div class="header-right">
      <div class="file-count" id="file-count"></div>
      <button class="icon-btn" id="btn-view-toggle" title="뷰 전환" aria-label="뷰 전환">
        <svg id="icon-grid" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        <svg id="icon-list" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" style="display:none">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
      </button>
      <button class="icon-btn" id="btn-favorites-filter" title="즐겨찾기 필터" aria-label="즐겨찾기 필터">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
      </button>
      <button class="icon-btn" id="btn-theme" title="테마 전환" aria-label="테마 전환">
        <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="display:none">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Gallery -->
  <main class="gallery-container" id="gallery-container" style="display:none">
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <span>파일 불러오는 중...</span>
    </div>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        opacity="0.4">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
      </svg>
      <p>이 폴더는 비어있습니다</p>
    </div>
  </main>

  <!-- Lightbox / Full-size Viewer -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
    <div class="lightbox-content" id="lightbox-content">
      <!-- Dynamic content: image / video / pdf -->
    </div>
    <div class="lightbox-toolbar" id="lightbox-toolbar">
      <div class="lightbox-info" id="lightbox-info"></div>
      <div class="lightbox-actions">
        <button class="icon-btn light" id="btn-favorite" title="즐겨찾기 (↑ 스와이프)" aria-label="즐겨찾기">
          <svg id="icon-star-outline" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          <svg id="icon-star-filled" width="20" height="20" viewBox="0 0 24 24" fill="#facc15" stroke="#facc15"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
        </button>
        <button class="icon-btn light" id="btn-fullscreen" title="전체 화면 (F)" aria-label="전체 화면">
          <svg id="icon-fullscreen-enter" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <polyline points="15 3 21 3 21 9" />
            <polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
          <svg id="icon-fullscreen-exit" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" style="display:none">
            <polyline points="4 14 10 14 10 20" />
            <polyline points="20 10 14 10 14 4" />
            <line x1="14" y1="10" x2="21" y2="3" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
        </button>
        <button class="icon-btn light" id="btn-download" title="다운로드" aria-label="다운로드">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </button>
        <button class="icon-btn light" id="btn-close" title="닫기 (Esc)" aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    </div>
    <button class="lightbox-nav lightbox-prev" id="btn-prev" title="이전 (←)" aria-label="이전 파일">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="btn-next" title="다음 (→)" aria-label="다음 파일">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18l6-6-6-6" />
      </svg>
    </button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
